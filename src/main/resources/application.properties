quarkus.hibernate-orm.log.sql=true

#quarkus.datasource.db-kind=h2
#quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

#quarkus.http.port=8081

# Habilita o filtro CORS
quarkus.http.cors.enabled=true
# Especifica as origens permitidas (lista separada por vírgulas)
quarkus.http.cors.origins=/.*/

# Opcional: Especifica os métodos HTTP permitidos (GET, POST, PUT, DELETE, OPTIONS, etc.)
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# Opcional: Especifica os cabeçalhos permitidos (Content-Type, Authorization, etc.)
quarkus.http.cors.headers=Accept,Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Location,X-Total-Count
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

smallrye.jwt.encrypt.key.location=public_key.pem

mp.jwt.verify.publickey.location=private_key.pem